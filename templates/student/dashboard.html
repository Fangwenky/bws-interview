{% extends "base.html" %}

{% block title %}面试报名 - 博物社面试管理系统{% endblock %}

{% block content %}
<div class="student-layout">
    <div class="sidebar">
        <h2>面试报名</h2>
        <ul>
            <li><a href="/student" class="active">可报名的场次</a></li>
            <li><a href="/student/applications">我的报名</a></li>
            <li><a href="/logout">退出登录</a></li>
        </ul>
        <div class="user-info">
            <p>欢迎，{{ session.name }}</p>
            <p>学号：{{ session.username }}</p>
        </div>
    </div>
    <div class="main-content">
        <h1 class="page-title">可报名的面试场次</h1>

        <div id="message"></div>

        <div id="interviewList"></div>
    </div>
</div>

<!-- 报名弹窗 -->
<div class="modal" id="applyModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>报名面试</h3>
            <button class="modal-close" onclick="closeApplyModal()">&times;</button>
        </div>
        <form id="applyForm">
            <input type="hidden" id="applyInterviewId">
            <div class="card" style="background:#f8f9fa; margin-bottom:20px;">
                <p><strong>面试场次：</strong><span id="applyInterviewTitle"></span></p>
                <p><strong>面试地点：</strong><span id="applyLocation"></span></p>
            </div>

            <div class="form-group">
                <label>选择时间段 *</label>
                <div id="timeSlotGrid" class="time-slot-grid"></div>
                <input type="hidden" id="selectedTimeSlot" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="firstPosition">第一志愿 *</label>
                    <select id="firstPosition" required>
                        <option value="">请选择</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="secondPosition">第二志愿</label>
                    <select id="secondPosition">
                        <option value="">无</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="phone">联系电话 *</label>
                <input type="tel" id="phone" required placeholder="请输入手机号码">
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="acceptAdjust">
                    <label for="acceptAdjust">我愿意接受调剂到其他部门</label>
                </div>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary">提交报名</button>
                <button type="button" class="btn btn-secondary" onclick="closeApplyModal()">取消</button>
            </div>
        </form>
    </div>
</div>

<!-- 我的报名弹窗 -->
<div class="modal" id="myAppsModal">
    <div class="modal-content" style="max-width:600px;">
        <div class="modal-header">
            <h3>我的报名</h3>
            <button class="modal-close" onclick="closeMyAppsModal()">&times;</button>
        </div>
        <div id="myAppsContent"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let allInterviews = [];
let selectedTimeSlotId = null;
let currentPositions = [];

async function loadInterviews() {
    try {
        var response = await fetch('/api/interviews');
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        var interviews = await response.json();
        allInterviews = interviews;

        var container = document.getElementById('interviewList');

        if (!interviews || interviews.length === 0) {
            container.innerHTML = '<div class="empty-state"><h3>暂无可报名的面试场次</h3><p>请留意社团通知，了解最新的招新安排。</p></div>';
            return;
        }

        // 检查是否已有报名
        var appsResp = await fetch('/api/applications');
        var myApps = await appsResp.json();
        var hasApplied = false;
        if (myApps && myApps.length > 0) {
            for (var i = 0; i < myApps.length; i++) {
                if (myApps[i].status === 'pending') {
                    hasApplied = true;
                    break;
                }
            }
        }

        var html = '';
        for (var i = 0; i < interviews.length; i++) {
            var interview = interviews[i];
            var positions = '未设置职位';
            var positionsStr = '';
            try {
                if (interview.positions) {
                    if (Array.isArray(interview.positions)) {
                        positions = interview.positions.join('、');
                        positionsStr = interview.positions.join(',');
                    } else {
                        positions = interview.positions;
                        positionsStr = interview.positions;
                    }
                }
            } catch(e) {
                positions = '未设置职位';
                positionsStr = '';
            }
            var btnHtml = hasApplied ? '<span class="badge badge-warning">您已报名</span>' : '<button class="btn btn-sm btn-primary" onclick="showApplyModal(' + interview.id + ', \'' + interview.title + '\', \'' + (interview.location || '') + '\', \'' + positionsStr + '\')">立即报名</button>';

            html += '<div class="card">';
            html += '<div class="application-header">';
            html += '<span class="application-title">' + interview.title + '</span>';
            html += btnHtml;
            html += '</div>';
            html += '<p><strong>日期：</strong>' + (interview.date || '待定') + '</p>';
            html += '<p><strong>等候区地点：</strong>' + (interview.location || '待定') + '</p>';
            html += '<p><strong>可面试职位：</strong>' + positions + '</p>';
            if (interview.note) {
                html += '<p><strong>备注：</strong>' + interview.note + '</p>';
            }
            html += '</div>';
        }

        container.innerHTML = html;
    } catch (error) {
        console.error('加载失败:', error);
        document.getElementById('interviewList').innerHTML = '<p style="color:red;">加载失败，请刷新页面</p>';
    }
}

function showApplyModal(interviewId, title, location, positionsStr) {
    document.getElementById('applyInterviewId').value = interviewId;
    document.getElementById('applyInterviewTitle').textContent = title;
    document.getElementById('applyLocation').textContent = location || '待定';
    document.getElementById('applyForm').reset();

    // 设置职位选项
    currentPositions = positionsStr ? positionsStr.split(',').filter(function(p) { return p; }) : [];
    const firstSelect = document.getElementById('firstPosition');
    const secondSelect = document.getElementById('secondPosition');

    firstSelect.innerHTML = '<option value="">请选择</option>';
    secondSelect.innerHTML = '<option value="">无</option>';

    currentPositions.forEach(function(p) {
        firstSelect.innerHTML += '<option value="' + p + '">' + p + '</option>';
        secondSelect.innerHTML += '<option value="' + p + '">' + p + '</option>';
    });

    // 加载时间段
    loadTimeSlots(interviewId);

    document.getElementById('applyModal').classList.add('show');
}

async function loadTimeSlots(interviewId) {
    try {
        var response = await fetch('/api/interviews/' + interviewId + '/time-slots');
        var slots = await response.json();

        var grid = document.getElementById('timeSlotGrid');
        grid.innerHTML = '';

        if (!slots || slots.length === 0) {
            grid.innerHTML = '<p style="color:#999;">该场次暂未设置时间段，请联系管理员</p>';
            return;
        }

        for (var i = 0; i < slots.length; i++) {
            var slot = slots[i];
            var isFull = slot.is_full;
            var div = document.createElement('div');
            div.className = 'time-slot-item ' + (isFull ? 'full' : '');
            div.innerHTML = '<div class="time">' + (slot.room_name || '房间') + '</div><div class="time">' + slot.start_time + ' - ' + slot.end_time + '</div><div class="count">' + (isFull ? '已满' : '可报名') + '</div>';
            if (!isFull) {
                div.onclick = function() { selectTimeSlot(slot.id, div); };
            }
            grid.appendChild(div);
        }
    } catch (error) {
        console.error('加载时间段失败:', error);
    }
}

function selectTimeSlot(slotId, element) {
    selectedTimeSlotId = slotId;
    document.getElementById('selectedTimeSlot').value = slotId;

    // 移除其他选中状态
    var items = document.querySelectorAll('.time-slot-item');
    for (var i = 0; i < items.length; i++) {
        items[i].classList.remove('selected');
    }
    element.classList.add('selected');
}

function closeApplyModal() {
    document.getElementById('applyModal').classList.remove('show');
    selectedTimeSlotId = null;
}

async function showMyApplications() {
    try {
        var response = await fetch('/api/applications');
        var applications = await response.json();

        var container = document.getElementById('myAppsContent');

        if (applications.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:#999;">您还没有报名任何面试场次</p>';
        } else {
            var html = '';
            for (var i = 0; i < applications.length; i++) {
                var app = applications[i];
                var statusText = app.status === 'pending' ? '<span class="badge badge-info">已报名</span>' : '<span class="badge badge-danger">已取消</span>';
                var roomInfo = app.room_name ? '<p><strong>面试地点：</strong>' + app.room_name + '</p>' : '';

                html += '<div class="card">';
                html += '<p><strong>面试场次：</strong>' + app.interview_title + '</p>';
                html += roomInfo;
                html += '<p><strong>时间段：</strong>' + app.start_time + ' - ' + app.end_time + '</p>';
                html += '<p><strong>第一志愿：</strong>' + app.first_position + '</p>';
                html += '<p><strong>第二志愿：</strong>' + (app.second_position || '-') + '</p>';
                html += '<p><strong>联系电话：</strong>' + (app.phone || '-') + '</p>';
                html += '<p><strong>报名状态：</strong>' + statusText + '</p>';
                if (app.status === 'pending') {
                    html += '<button class="btn btn-sm btn-danger" onclick="cancelApplication(' + app.id + ')">取消报名</button>';
                }
                html += '</div>';
            }
            container.innerHTML = html;
        }

        document.getElementById('myAppsModal').classList.add('show');
    } catch (error) {
        console.error('加载失败:', error);
    }
}

function closeMyAppsModal() {
    document.getElementById('myAppsModal').classList.remove('show');
}

async function cancelApplication(appId) {
    if (!confirm('确定要取消报名吗？取消后需要重新报名。')) return;

    try {
        const response = await fetch(`/api/applications/${appId}`, { method: 'DELETE' });
        const data = await response.json();

        if (data.success) {
            showMessage('取消报名成功', 'success');
            showMyApplications(); // 刷新列表
            loadInterviews(); // 刷新场次列表
        } else {
            showMessage(data.message || '取消失败', 'error');
        }
    } catch (error) {
        showMessage('取消失败', 'error');
    }
}

document.getElementById('applyForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const interviewId = document.getElementById('applyInterviewId').value;
    const timeSlotId = selectedTimeSlotId;
    const firstPosition = document.getElementById('firstPosition').value;
    const secondPosition = document.getElementById('secondPosition').value;
    const phone = document.getElementById('phone').value.trim();
    const acceptAdjust = document.getElementById('acceptAdjust').checked;

    if (!timeSlotId) {
        showMessage('请选择面试时间段', 'error');
        return;
    }

    try {
        const response = await fetch('/api/applications', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                interview_id: parseInt(interviewId),
                time_slot_id: timeSlotId,
                first_position: firstPosition,
                second_position: secondPosition,
                phone: phone,
                accept_adjust: acceptAdjust
            })
        });
        const data = await response.json();

        if (data.success) {
            showMessage('报名成功！', 'success');
            closeApplyModal();
            loadInterviews();
        } else {
            showMessage(data.message || '报名失败', 'error');
        }
    } catch (error) {
        showMessage('报名失败', 'error');
    }
});

function showMessage(msg, type) {
    var div = document.getElementById('message');
    if (div) {
        div.className = 'message ' + type;
        div.textContent = msg;
        setTimeout(function() { div.textContent = ''; }, 3000);
    }
}

loadInterviews();
</script>
{% endblock %}
