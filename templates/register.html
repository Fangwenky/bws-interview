{% extends "base.html" %}

{% block title %}注册 - 博物社面试管理系统{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <h1>学生注册</h1>
        <form id="registerForm">
            <div class="form-group">
                <label for="name">姓名</label>
                <input type="text" id="name" name="name" required placeholder="请输入真实姓名">
            </div>
            <div class="form-group">
                <label for="username">学号</label>
                <input type="text" id="username" name="username" required placeholder="请输入学号（纯数字）">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="请设置密码">
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="请再次输入密码">
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary">注册</button>
            </div>
            <div class="form-links">
                <a href="{{ url_for('login') }}">已有账号？立即登录</a>
            </div>
        </form>
        <div id="message" class="message"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const messageDiv = document.getElementById('message');

    if (password !== confirmPassword) {
        messageDiv.className = 'message error';
        messageDiv.textContent = '两次密码输入不一致';
        return;
    }

    if (!/^\d+$/.test(username)) {
        messageDiv.className = 'message error';
        messageDiv.textContent = '学号必须是纯数字';
        return;
    }

    try {
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, username, password})
        });
        const data = await response.json();

        if (data.success) {
            messageDiv.className = 'message success';
            messageDiv.textContent = data.message;
            setTimeout(() => {
                window.location.href = '/login';
            }, 1500);
        } else {
            messageDiv.className = 'message error';
            messageDiv.textContent = data.message;
        }
    } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = '注册失败，请稍后重试';
    }
});
</script>
{% endblock %}
