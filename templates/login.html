{% extends "base.html" %}

{% block title %}登录 - 博物社面试管理系统{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <h1>博物社面试管理系统</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名 / 学号</label>
                <input type="text" id="username" name="username" required placeholder="请输入用户名或学号">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="请输入密码">
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary">登录</button>
            </div>
            <div class="form-links">
                <a href="{{ url_for('register') }}">学生注册</a>
            </div>
        </form>
        <div id="message" class="message"></div>
    </div>

    <div class="test-accounts" style="display: none;">
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const messageDiv = document.getElementById('message');

    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });
        const data = await response.json();

        if (data.success) {
            messageDiv.className = 'message success';
            messageDiv.textContent = '登录成功，正在跳转...';
            setTimeout(() => {
                if (data.role === 'admin') {
                    window.location.href = '/admin';
                } else if (data.role === 'interviewer') {
                    window.location.href = '/interviewer';
                } else {
                    window.location.href = '/student';
                }
            }, 500);
        } else {
            messageDiv.className = 'message error';
            messageDiv.textContent = data.message;
        }
    } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = '登录失败，请稍后重试';
    }
});
</script>
{% endblock %}
